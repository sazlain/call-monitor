<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metas sin cumplir</title>
</head>
<body style="margin:0;padding:0;background:#F3F4F6;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F3F4F6;padding:32px 0;">
    <tr><td align="center">

      <!-- Card -->
      <table width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;background:#FFFFFF;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.10);">

        <!-- Header band -->
        <tr>
          <td style="background:#7C3AED;padding:28px 32px;">
            <div style="font-size:36px;line-height:1;margin-bottom:10px;">&#127919;</div>
            <div style="font-size:22px;font-weight:700;color:#FFFFFF;margin:0;">Metas sin cumplir</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px;">Los siguientes agentes no alcanzaron sus metas el {{date}}.</div>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:28px 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin-top:16px;font-size:13px;">
              <thead>
                <tr style="background:#F3F4F6;">
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;border-radius:4px 0 0 4px;">Agente</th>
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;">KPI</th>
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;">Per&iacute;odo</th>
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;">Actual</th>
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;">Meta</th>
                  <th style="padding:10px 12px;text-align:left;color:#6B7280;font-weight:600;border-radius:0 4px 4px 0;">Progreso</th>
                </tr>
              </thead>
              <tbody>
                {{tableRows}}
              </tbody>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#F9FAFB;border-top:1px solid #E5E7EB;padding:16px 32px;text-align:center;">
            <p style="margin:0;font-size:12px;color:#9CA3AF;">
              Voxio &mdash; Sistema de gesti&oacute;n de llamadas<br>
              Este es un mensaje autom&aacute;tico, no responder.
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
