<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Llamada a número sin lead</title>
</head>
<body style="margin:0;padding:0;background:#F3F4F6;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#F3F4F6;padding:32px 0;">
    <tr><td align="center">

      <!-- Card -->
      <table width="600" cellpadding="0" cellspacing="0" border="0"
             style="max-width:600px;width:100%;background:#FFFFFF;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.10);">

        <!-- Header band -->
        <tr>
          <td style="background:#DC2626;padding:28px 32px;">
            <div style="font-size:36px;line-height:1;margin-bottom:10px;">&#128565;</div>
            <div style="font-size:22px;font-weight:700;color:#FFFFFF;margin:0;">Llamada a n&uacute;mero sin lead</div>
            <div style="font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px;">Se realiz&oacute; una llamada saliente a un n&uacute;mero que no tiene lead registrado.</div>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:28px 32px;">
            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;margin:16px 0;">
              <tr style="border-bottom:1px solid #F3F4F6;">
                <td style="padding:10px 0;font-size:13px;color:#6B7280;width:40%;">Agente</td>
                <td style="padding:10px 0;font-size:14px;font-weight:600;color:#111827;">{{agentName}}</td>
              </tr>
              <tr style="border-bottom:1px solid #F3F4F6;">
                <td style="padding:10px 0;font-size:13px;color:#6B7280;width:40%;">Extensi&oacute;n</td>
                <td style="padding:10px 0;font-size:14px;font-weight:600;color:#111827;">{{extension}}</td>
              </tr>
              <tr style="border-bottom:1px solid #F3F4F6;">
                <td style="padding:10px 0;font-size:13px;color:#6B7280;width:40%;">N&uacute;mero marcado</td>
                <td style="padding:10px 0;font-size:14px;font-weight:600;color:#111827;">{{calledNumber}}</td>
              </tr>
              <tr>
                <td style="padding:10px 0;font-size:13px;color:#6B7280;width:40%;">Hora</td>
                <td style="padding:10px 0;font-size:14px;font-weight:600;color:#111827;">{{timestamp}}</td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer -->
        <tr>
          <td style="background:#F9FAFB;border-top:1px solid #E5E7EB;padding:16px 32px;text-align:center;">
            <p style="margin:0;font-size:12px;color:#9CA3AF;">
              Voxio &mdash; Sistema de gesti&oacute;n de llamadas<br>
              Este es un mensaje autom&aacute;tico, no responder.
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
