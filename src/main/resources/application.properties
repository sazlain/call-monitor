spring.application.name=call
spring.config.import=optional:file:.env[.properties]
server.port=8080

# Base de datos
spring.datasource.url=jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB}
# Docker: spring.datasource.url=jdbc:postgresql://db:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.sql.init-mode=always
spring.sql.init.platform=postgres
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Serializar fechas como ISO-8601 string (no como array ni epoch)
spring.jackson.serialization.write-dates-as-timestamps=false

# JWT (minimo 32 chars para HS256)
spring.jwt.secret=${JWT_SECRET:cambiar-este-secret-en-produccion-minimo-32-chars}
spring.jwt.token.expiration.minutes=3600

server.use-forward-headers=true

# Clave maestra para crear admins
app.admin.secret=${APP_ADMIN_SECRET:admin-secret-cambiar-en-produccion}

# Webhook: IPs permitidas del proveedor de telefonia
# Usar * mientras no se tenga la IP. El filtro logueara la IP entrante.
app.webhook.allowed-ips=${WEBHOOK_ALLOWED_IPS:*}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Archivos (CSV de leads)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.devtools.restart.enabled=false

springdoc.swagger-ui.servers[0].url=${URL-SERVER-PROD:http://localhost:8080}
springdoc.swagger-ui.servers[0].description=${URL-SERVER-DESC:Servidor local}

# Email (SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# Email del administrador del sistema para alertas
app.admin.email=${ADMIN_EMAIL:}