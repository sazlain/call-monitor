vapid.public.key=${VAPID_PUBLIC_KEY:BDtYr2RIIdHlD6qkPK_DMzf9Ato0Kx-bQ9Wod1zpoa52mx38FxiZFQPLiGSA7_Fr7YxjigteXt1u97xs1O2UvJo}
