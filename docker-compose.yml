version: '3.9'

services:
  # Servicio de Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: call-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-calluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callpassword}
      POSTGRES_DB: ${POSTGRES_DB:-calldb}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calluser}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - call-network
    restart: unless-stopped

  # Servicio de Aplicación Spring Boot
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: call-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-calldb}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-calluser}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-callpassword}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-calldb}
      POSTGRES_USER: ${POSTGRES_USER:-calluser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-callpassword}
    ports:
      - "${APP_PORT:-8086}:8086"
    volumes:
      - ./src:/app/src
      - ./target:/app/target
    networks:
      - call-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local

networks:
  call-network:
    driver: bridge

